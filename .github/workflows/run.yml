name: Run Blogger Auto Post Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies for YouTube Search Bot
        run: |
          python -m pip install --upgrade pip
          if [ -f bot_youtube_search/requirements.txt ]; then pip install -r bot_youtube_search/requirements.txt; fi

      - name: Run YouTube Search Bot
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python bot_youtube_search/main.py

      - name: Install dependencies for AI News Bot
        run: |
          if [ -f bot_ai_news/requirements.txt ]; then pip install -r bot_ai_news/requirements.txt; fi

      - name: Run AI News Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python bot_ai_news/main.py
